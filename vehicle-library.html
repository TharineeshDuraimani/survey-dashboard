<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Vehicle Library</title>

<link rel="stylesheet" href="common.css">
<link rel="stylesheet" href="vehicle-library.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<main class="vehicle-library">

    <button class="back-btn">

        <i class="fas fa-arrow-left"></i>

        Back

    </button>

    <div class="card vehicle-info">

        <h2 id="vehicleNo"></h2>

        <p id="surveyNo"></p>

        <div id="completionText"></div>

    </div>

   <div class="folder">

    <div class="folder-header">

        <span>📁 Reports</span>

        <i class="fas fa-chevron-down"></i>

    </div>

    <div class="folder-content">

        <div class="file-item">
            Interim Report 1
        </div>

        <div class="file-item">
            Interim Report 2
        </div>

        <div class="file-item">
            Final Report
        </div>

    </div>

</div>

<div class="folder">

    <div class="folder-header">

        <span>📁 Letters</span>

        <i class="fas fa-chevron-down"></i>

    </div>

    <div class="folder-content">

        <div class="file-item">
            LOI 1
        </div>

        <div class="file-item">
            LOR 1
        </div>

    </div>

</div>

<div class="folder">

    <div class="folder-header">

        <span>📁 Documents</span>

        <i class="fas fa-chevron-down"></i>

    </div>

    <div class="folder-content">

        <div class="file-item">
            Vehicle Images
        </div>

        <div class="file-item">
            Vehicle Documents
        </div>

    </div>

</div>

</main>

<script src="vehicle-library.js"></script>

</body>

</html>
