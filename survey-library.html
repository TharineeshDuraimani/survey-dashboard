<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Survey Library</title>

    <link rel="stylesheet"
          href="../css/common.css">

    <link rel="stylesheet"
          href="../css/survey-library.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<header class="navbar">

    <div class="nav-left">

        <button class="hamburger"
                id="hamburger">

            <i class="fas fa-bars"></i>

        </button>

        <h2 class="logo">
            Survey Dashboard
        </h2>

    </div>

    <nav class="desktop-nav">

        <a href="../index.html">
            Dashboard
        </a>

        <div class="dropdown">

            <button class="drop-btn">

                Surveys

                <i class="fas fa-chevron-down"></i>

            </button>

            <div class="dropdown-content">

                <a href="survey-new.html">
                    New Survey
                </a>

                <a href="survey-library.html">
                    Survey Library
                </a>

            </div>

        </div>

    </nav>

</header>

<aside class="sidebar"
       id="sidebar">

    <a href="../index.html">
        Dashboard
    </a>

    <div class="mobile-dropdown">

        <button id="mobileSurveyBtn">

            Surveys

            <i class="fas fa-chevron-down"></i>

        </button>

        <div id="mobileSurveyMenu">

            <a href="survey-new.html">
                New Survey
            </a>

            <a href="survey-library.html">
                Survey Library
            </a>

        </div>

    </div>

</aside>

<div class="overlay"
     id="overlay"></div>

<main class="library-container">

    <section class="page-header">

        <h1>
            Survey Library
        </h1>

        <p>
            Manage vehicle surveys, reports,
            letters and documents.
        </p>

    </section>

    <!-- SEARCH -->

    <section class="search-section card">

        <div class="search-box">

            <i class="fas fa-search"></i>

            <input type="text"
                   id="searchInput"
                   placeholder="Search Vehicle No or Survey No">

        </div>

    </section>

    <!-- VEHICLE LIST -->

    <section id="surveyContainer">

    </section>

</main>

<script src="../js/navbar.js"></script>
<script src="../js/survey-library.js"></script>

</body>

</html>
